<!doctype html>
<html lang="cs">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title><%= todo.title %> – Todo detail</title>
</head>
<body>
<p><a href="/">&larr; Zpět na seznam</a></p>

<div id="todo-detail-content" data-id="<%= todo.id %>">
    <%- include('_todo-detail.html', { todo, utils }) %>
</div>

<script>
    const container = document.getElementById('todo-detail-content');
    const todoId = parseInt(container.getAttribute('data-id'));

    let isNavigating = false;

    window.addEventListener('beforeunload', () => {
        isNavigating = true;
    });

    const ws = new WebSocket(`ws://localhost:3000/ws`);

    ws.addEventListener('message', (ev) => {
        if (isNavigating) return;

        const json = JSON.parse(ev.data);

        // Reacting only for todo-detail
        if (json.type === 'todo-detail' && json.id === todoId) {
            if (json.deleted) {
                container.innerHTML = `
                    <div style="background: #fee; padding: 20px; border: 1px solid red;">
                        <h2>Varování</h2>
                        <p>Tento úkol byl právě smazán jiným uživatelem.</p>
                        <a href="/">&larr; Zpět na seznam</a>
                    </div>
                `;
            } else {
                container.innerHTML = json.html;
            }
        }
    });
</script>
</body>
</html>
